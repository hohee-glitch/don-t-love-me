<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do You Love Me 💔</title>

<style>
    body {
        background: #ffe6f0;
        font-family: 'Comic Sans MS', cursive;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        text-align: center;
    }

    .box {
        background: white;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        position: relative;
        width: 360px;
        height: 300px;
    }

    h1 {
        color: #ff4d88;
    }

    #timer {
        color: #ff4d88;
        font-size: 20px;
        margin-bottom: 15px;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 20px;
        font-size: 18px;
        cursor: pointer;
        position: absolute;
        transition: all 0.3s ease;
    }

    #yes {
        background: #ff66a3;
        color: white;
        left: 80px;
        top: 170px;
    }

    #no {
        background: #333;
        color: white;
        left: 200px;
        top: 170px;
    }
</style>
</head>

<body>

<div class="box" id="box">
    <div id="timer">Time left: 3s</div>
    <h1>Do you love me? 💖</h1>

    <button id="yes">Yes 💕</button>
    <button id="no">No 💔</button>
</div>

<!-- Sad meme sound -->
<audio id="sadSound">
    <source src="sad.mp3" type="audio/mpeg">
</audio>

<script>
    const yesBtn = document.getElementById("yes");
    const noBtn = document.getElementById("no");
    const box = document.getElementById("box");
    const timerText = document.getElementById("timer");
    const sadSound = document.getElementById("sadSound");

    let timeLeft = 3;
    let noSize = 18;

    const countdown = setInterval(() => {
        timeLeft--;
        timerText.innerText = `Time left: ${timeLeft}s`;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            sadSound.play();
            box.innerHTML = "<h1>I knew it<br>BYEEE BREAK UP 💔</h1>";
        }
    }, 1000);

    yesBtn.addEventListener("click", () => {
        const x = Math.random() * 200;
        const y = Math.random() * 150;
        yesBtn.style.left = x + "px";
        yesBtn.style.top = y + "px";

        noSize += 6;
        noBtn.style.fontSize = noSize + "px";
        noBtn.style.padding = (12 + noSize/3) + "px";

        timeLeft = 3;
    });

    noBtn.addEventListener("click", () => {
        clearInterval(countdown);
        sadSound.play();
        box.innerHTML = "<h1>আমি তো ভালা না,<br>ভালা লইয়াই থাকো 💔</h1>";
    });
</script>

</body>
</html>
